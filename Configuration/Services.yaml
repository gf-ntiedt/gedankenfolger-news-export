services:
  _defaults:
    # All services are wired automatically via type-hinted constructor parameters.
    autowire: true
    # Service tags (e.g. console.command) are applied automatically where possible.
    autoconfigure: true
    # Services are private by default; the container injects them where needed.
    public: false

  # Register every class under the extension namespace as a service so that
  # constructor injection works without explicit declarations for most classes.
  Gedankenfolger\GedankenfolgerNewsExport\:
    resource: '../Classes/*'

  # -------------------------------------------------------------------------
  # CLI command – explicitly tagged so that the Symfony console discovers it.
  # `schedulable: true` makes the command available in the TYPO3 Scheduler.
  # -------------------------------------------------------------------------
  # -------------------------------------------------------------------------
  # Backend module controller – tagged explicitly so the module router finds it
  # in TYPO3 12 and 13.  In TYPO3 13 this replaces the #[AsController] PHP
  # attribute; in TYPO3 12 the attribute class does not exist, so the tag here
  # is the only registration path.  In TYPO3 11 this tag is simply ignored and
  # the module is not registered (CLI-only usage for v11 is intentional).
  # -------------------------------------------------------------------------
  Gedankenfolger\GedankenfolgerNewsExport\Controller\NewsExportController:
    tags:
      - name: 'backend.controller'

  # -------------------------------------------------------------------------
  # CLI command – explicitly tagged so that the Symfony console discovers it.
  # `schedulable: true` makes the command available in the TYPO3 Scheduler.
  # -------------------------------------------------------------------------
  Gedankenfolger\GedankenfolgerNewsExport\Command\ExportNewsCommand:
    tags:
      - name: 'console.command'
        command: 'news:export'
        description: 'Export georgringer/news records as a .t3d file'
        schedulable: true
